name: Deploy D1 Migrations

on:
  push:
    branches: [main]
    paths: ['infrastructure/cloudflare/d1/migrations/**']

jobs:
  migrate:
    name: Run D1 Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: d1 execute duet-company-prod --file=infrastructure/cloudflare/d1/migrations/001_initial.sql
