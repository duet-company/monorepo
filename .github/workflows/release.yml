name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun run test || true

      - name: Build all packages
        run: bun run build

      - name: Generate changelog
        id: changelog
        run: |
          VERSION=${{ github.event.inputs.version || github.ref_name }}
          echo "Generating changelog for $VERSION"
          echo "## What's Changed" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log --pretty=format:"- %s" $(git describe --tags --abbrev=0 HEAD^)..HEAD >> CHANGELOG.md || true
          cat CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Release ${{ github.event.inputs.version || github.ref_name }}
          body_path: CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.event.inputs.version || github.ref_name, 'beta') || contains(github.event.inputs.version || github.ref_name, 'alpha') }}
          files: |
            apps/web/.next/**/*
            apps/*/dist/**/*
            packages/*/dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy Release
    runs-on: ubuntu-latest
    needs: release
    environment:
      name: production
    steps:
      - name: Deployment summary
        run: |
          echo "🚀 Release ${{ github.event.inputs.version || github.ref_name }} deployed successfully!"
          echo "Web: https://duet.company"
          echo "API: https://api.duet.company"

      - name: Notify on success
        if: success()
        run: |
          echo "Release completed successfully!"

      - name: Notify on failure
        if: failure()
        run: |
          echo "Release failed! Please check the logs."
          exit 1
