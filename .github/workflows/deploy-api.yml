name: Deploy API

on:
  push:
    branches: [main]
    paths: ['apps/api/**', 'infrastructure/cloudflare/workers/**']

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build API worker
        run: |
          cd infrastructure/cloudflare/workers
          bun build api-worker.ts --outfile=api-worker.js --target=browser

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: workers deploy infrastructure/cloudflare/workers/api-worker.js
