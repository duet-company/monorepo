name: Deploy API

on:
  push:
    branches: [main, develop]
    paths: ['apps/api/**', 'infrastructure/cloudflare/workers/**', '.github/workflows/deploy-api.yml']
  pull_request:
    branches: [main]
    paths: ['apps/api/**', 'infrastructure/cloudflare/workers/**']

jobs:
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build API worker
        env:
          ENVIRONMENT: ${{ github.ref_name == 'main' && 'production' || 'preview' }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Building API worker for ${{ github.ref_name }} branch"
          cd infrastructure/cloudflare/workers
          bun build api-worker.ts --outfile=api-worker.js --target=browser

      - name: Deploy to Cloudflare Workers
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: |
            workers deploy infrastructure/cloudflare/workers/api-worker.js \
              --name=duet-company-api${{ github.ref_name != 'main' && '-preview' || '' }} \
              ${{ github.ref_name != 'main' && '--env preview' || '' }}

      - name: Output deployment URL
        run: |
          echo "API Worker deployed to: https://duet-company-api${{ github.ref_name != 'main' && '-preview' || '' }}.workers.dev"

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref_name == 'main'
    steps:
      - name: Deployment summary
        run: |
          echo "🚀 Production API deployment successful!"
          echo "URL: https://api.duet.company"
